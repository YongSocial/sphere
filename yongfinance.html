<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YongFinance · RSS Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #070b14;
      color: #e7ecf5;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 0;
      border-bottom: 1px solid #1f2940;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .header-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid #1f2940;
    }

    .header-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header h1 span {
      color: #d4b25a;
    }

    .header .tag {
      background: #121a2d;
      border: 1px solid #d4b25a;
      border-radius: 9999px;
      padding: 0.25rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #d4b25a;
      margin-left: auto;
    }

    @media (max-width: 600px) {
      .header .tag {
        margin-left: 0;
        width: 100%;
        text-align: center;
      }
    }

    /* Feed info */
    .feed-info {
      background: #0f1626;
      border: 1px solid #1f2940;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .feed-info .label {
      color: #8a93a8;
      font-size: 0.85rem;
    }

    .feed-info .count {
      color: #d4b25a;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .feed-info .refresh-btn {
      background: transparent;
      border: 1px solid #1f2940;
      color: #8a93a8;
      border-radius: 9999px;
      padding: 0.3rem 1rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .feed-info .refresh-btn:hover {
      border-color: #d4b25a;
      color: #d4b25a;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: #8a93a8;
    }

    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1f2940;
      border-top-color: #d4b25a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Post cards */
    .post-card {
      background: linear-gradient(180deg, #0f1626, #0b1120);
      border: 1px solid #1f2940;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }

    .post-card:hover {
      border-color: #2a3a5a;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .post-meta .blog-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid #1f2940;
    }

    .post-meta .blog-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .post-meta .blog-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #e7ecf5;
    }

    .post-meta .post-date {
      color: #8a93a8;
      font-size: 0.75rem;
    }

    .post-meta .post-tag {
      background: #121a2d;
      border: 1px solid rgba(212, 178, 90, 0.2);
      border-radius: 9999px;
      padding: 0.1rem 0.6rem;
      font-size: 0.65rem;
      color: #d4b25a;
      font-weight: 600;
      margin-left: auto;
    }

    .post-title {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 0.5rem;
      color: #e7ecf5;
    }

    .post-title a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }

    .post-title a:hover {
      color: #d4b25a;
    }

    /* Post Image */
    .post-image {
      margin: 0.75rem 0 0.75rem 0;
      border-radius: 12px;
      overflow: hidden;
      background: #0b1120;
      aspect-ratio: 16 / 9;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .post-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .post-image .no-image {
      color: #5a6378;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      background: #0f1626;
    }

    .post-excerpt {
      color: #8a93a8;
      font-size: 0.9rem;
      line-height: 1.6;
      margin: 0.5rem 0 0.75rem 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid #1f2940;
    }

    .post-footer .read-btn {
      background: #d4b25a;
      color: #0b1120;
      font-weight: 600;
      border: none;
      border-radius: 9999px;
      padding: 0.4rem 1.2rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: filter 0.15s;
      font-family: 'Inter', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .post-footer .read-btn:hover {
      filter: brightness(1.05);
    }

    .post-footer .read-btn i {
      font-size: 0.7rem;
    }

    /* Error state */
    .error {
      text-align: center;
      padding: 4rem 2rem;
      color: #ef4444;
    }

    .error .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .error h3 {
      color: #e7ecf5;
      margin-bottom: 0.5rem;
    }

    .error p {
      color: #8a93a8;
      font-size: 0.9rem;
    }

    .error .retry-btn {
      margin-top: 1rem;
      background: #d4b25a;
      color: #0b1120;
      border: none;
      border-radius: 9999px;
      padding: 0.5rem 1.5rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .error .retry-btn:hover {
      filter: brightness(1.05);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: #8a93a8;
    }

    .empty .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty h3 {
      color: #e7ecf5;
      margin-bottom: 0.5rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      body {
        padding: 1rem 0.75rem;
      }

      .header {
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .header .tag {
        margin-left: 0;
        width: 100%;
        text-align: center;
      }

      .post-card {
        padding: 1rem;
      }

      .post-title {
        font-size: 1rem;
      }

      .feed-info {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhu_7mdnTHeYcrLaxRY0veIDVO6Pb0Pk4ngLKZupHTxufcBF3hwrlsgIxyXHfiDu_NywzKTnvLoGuh37Lv6k1Qkl0Q5HlHFn_sOa6ow8cL2TGXee1kSl6Uohtv_SggJ1UBhfNpUG4ClC1kPMkpC7Am3wX3cmDve4a95uvhmjNfF97aP2-hUVpX_Wk2dh56a/s1200/file_00000000814c720aa68fca8155db1cab_copy_1200x630.png" alt="Yong Social" />
      </div>
      <h1>Yong <span>Finance</span></h1>
      <span class="tag"><i class="fa-solid fa-tag"></i> YongFinance</span>
    </header>

    <!-- Feed Info -->
    <div class="feed-info">
      <span class="label"><i class="fa-solid fa-rss"></i> RSS Feed</span>
      <span class="count" id="postCount">Loading...</span>
      <button class="refresh-btn" onclick="fetchFeed()"><i class="fa-solid fa-rotate"></i> Refresh</button>
    </div>

    <!-- Posts Container -->
    <div id="postsContainer">
      <div class="loading">
        <div class="spinner"></div>
        <p>Fetching feed from YongSocial...</p>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // RSS FEED FETCHER with CORS Proxy
    // ============================================

    const BLOG_LOGO = 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhu_7mdnTHeYcrLaxRY0veIDVO6Pb0Pk4ngLKZupHTxufcBF3hwrlsgIxyXHfiDu_NywzKTnvLoGuh37Lv6k1Qkl0Q5HlHFn_sOa6ow8cL2TGXee1kSl6Uohtv_SggJ1UBhfNpUG4ClC1kPMkpC7Am3wX3cmDve4a95uvhmjNfF97aP2-hUVpX_Wk2dh56a/s1200/file_00000000814c720aa68fca8155db1cab_copy_1200x630.png';
    const RSS_URL = 'https://www.yongsocial.com/feeds/posts/default/-/YongFinance?alt=rss';
    const PROXIES = [
      'https://api.allorigins.win/raw?url=',
      'https://corsproxy.io/?',
      'https://api.rss2json.com/v1/api.json?rss_url='
    ];

    const container = document.getElementById('postsContainer');

    async function fetchFeed() {
      container.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Fetching feed...</p>
        </div>
      `;

      for (let i = 0; i < PROXIES.length; i++) {
        try {
          const proxyUrl = PROXIES[i] + encodeURIComponent(RSS_URL);
          const response = await fetch(proxyUrl);
          
          if (!response.ok) continue;
          
          const text = await response.text();
          
          // If using rss2json, it returns JSON
          if (PROXIES[i].includes('rss2json')) {
            const json = JSON.parse(text);
            if (json.status === 'ok' && json.items && json.items.length > 0) {
              renderPostsFromJson(json.items);
              return;
            }
            continue;
          }

          // Parse XML response
          const parser = new DOMParser();
          const xml = parser.parseFromString(text, 'text/xml');
          
          const parseError = xml.querySelector('parsererror');
          if (parseError) continue;
          
          const items = xml.querySelectorAll('item');
          if (items.length === 0) continue;
          
          renderPostsFromXml(items);
          return;
          
        } catch (error) {
          console.warn(`Proxy ${i + 1} failed:`, error.message);
          continue;
        }
      }

      // All proxies failed
      container.innerHTML = `
        <div class="error">
          <div class="icon">⚠️</div>
          <h3>Failed to load feed</h3>
          <p>Unable to fetch the RSS feed. The feed may be temporarily unavailable.</p>
          <button class="retry-btn" onclick="fetchFeed()">Try Again</button>
        </div>
      `;
      document.getElementById('postCount').textContent = 'Error';
    }

    // ============================================
    // EXTRACT IMAGE FROM HTML
    // ============================================

    function extractImageFromHtml(html) {
      if (!html) return null;
      
      // Try to find img tag in the content
      const imgMatch = html.match(/<img[^>]+src=["']([^"']+)["']/i);
      if (imgMatch && imgMatch[1]) {
        // Filter out tiny icons or tracking pixels
        const url = imgMatch[1];
        if (url.includes('1x1') || url.includes('pixel') || url.includes('transparent')) {
          return null;
        }
        return url;
      }
      
      // Try to find any image URL in the content
      const urlMatch = html.match(/https?:\/\/[^\s"']+\.(jpg|jpeg|png|gif|webp)/i);
      if (urlMatch) {
        return urlMatch[0];
      }
      
      return null;
    }

    function cleanHtmlForExcerpt(html) {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;
      // Remove image tags for the excerpt
      tempDiv.querySelectorAll('img').forEach(img => img.remove());
      const text = tempDiv.textContent || tempDiv.innerText || '';
      return text.replace(/\s+/g, ' ').trim();
    }

    // ============================================
    // RENDER FUNCTIONS
    // ============================================

    function renderPostsFromXml(items) {
      document.getElementById('postCount').textContent = `${items.length} posts`;

      let html = '';
      items.forEach((item) => {
        const title = item.querySelector('title')?.textContent || 'Untitled';
        const link = item.querySelector('link')?.textContent || '#';
        const pubDate = item.querySelector('pubDate')?.textContent || '';
        const description = item.querySelector('description')?.textContent || '';
        const content = item.querySelector('content\\:encoded')?.textContent || description;
        const creator = item.querySelector('dc\\:creator')?.textContent || 'Yong Social';

        const imageUrl = extractImageFromHtml(content || description);
        const cleanExcerpt = cleanHtmlForExcerpt(description || content);
        const excerpt = cleanExcerpt.slice(0, 200) + (cleanExcerpt.length > 200 ? '...' : '');
        const formattedDate = formatDate(pubDate);

        html += buildPostCard(title, link, formattedDate, excerpt, creator, imageUrl);
      });

      container.innerHTML = html;
    }

    function renderPostsFromJson(items) {
      document.getElementById('postCount').textContent = `${items.length} posts`;

      let html = '';
      items.forEach((item) => {
        const title = item.title || 'Untitled';
        const link = item.link || '#';
        const pubDate = item.pubDate || '';
        const description = item.description || '';
        const content = item.content || description;
        const creator = item.author || 'Yong Social';

        const imageUrl = item.thumbnail || extractImageFromHtml(content || description);
        const cleanExcerpt = cleanHtmlForExcerpt(description || content);
        const excerpt = cleanExcerpt.slice(0, 200) + (cleanExcerpt.length > 200 ? '...' : '');
        const formattedDate = formatDate(pubDate);

        html += buildPostCard(title, link, formattedDate, excerpt, creator, imageUrl);
      });

      container.innerHTML = html;
    }

    // ============================================
    // HELPERS
    // ============================================

    function formatDate(pubDate) {
      if (!pubDate) return '';
      try {
        const date = new Date(pubDate);
        return date.toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric',
          year: 'numeric'
        });
      } catch {
        return pubDate;
      }
    }

    function buildPostCard(title, link, date, excerpt, creator, imageUrl) {
      const imageHtml = imageUrl ? `
        <div class="post-image">
          <img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'><i class=\\'fa-regular fa-image\\'></i> No image</div>'" />
        </div>
      ` : '';

      return `
        <article class="post-card">
          <div class="post-meta">
            <div class="blog-icon">
              <img src="${BLOG_LOGO}" alt="Yong Social" />
            </div>
            <span class="blog-name">${escapeHtml(creator)}</span>
            ${date ? `<span class="post-date">${escapeHtml(date)}</span>` : ''}
            <span class="post-tag">#YongFinance</span>
          </div>
          <h2 class="post-title">
            <a href="${escapeHtml(link)}" target="_blank" rel="noopener">${escapeHtml(title)}</a>
          </h2>
          ${imageHtml}
          ${excerpt ? `<p class="post-excerpt">${escapeHtml(excerpt)}</p>` : ''}
          <div class="post-footer">
            <span style="color:#5a6378;font-size:0.75rem;">
              <i class="fa-regular fa-clock"></i> ${date || 'Recent'}
            </span>
            <a href="${escapeHtml(link)}" target="_blank" rel="noopener" class="read-btn">
              Read Now <i class="fa-solid fa-arrow-right"></i>
            </a>
          </div>
        </article>
      `;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================
    // AUTO-REFRESH EVERY 5 MINUTES
    // ============================================

    fetchFeed();
    setInterval(fetchFeed, 5 * 60 * 1000);
  </script>

</body>
</html>
