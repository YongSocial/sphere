// ============================================

// ============================================
function getUTCDay() {
  var now = new Date();
  return now.getUTCFullYear() + '-' + String(now.getUTCMonth()+1).padStart(2,'0') + '-' + String(now.getUTCDate()).padStart(2,'0');
}

async function getTONPrice() {
  try {
    var doc = await db.collection('config').doc('tonPriceCache').get();
    if (doc.exists) {
      var data = doc.data();
      if (data.day === getUTCDay() && data.price) {
        var age = Date.now() - (data.timestamp || 0);
        if (age < 86400000) {
          TON_PRICE = data.price;
          return data.price;
        }
      }
    }
    var response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd');
    if (!response.ok) throw new Error('Price fetch failed');
    var data = await response.json();
    var price = data['the-open-network']?.usd;
    if (!price || typeof price !== 'number') throw new Error('Invalid price data');
    TON_PRICE = price;
    try {
      await db.collection('config').doc('tonPriceCache').set({
        price: price,
        day: getUTCDay(),
        timestamp: Date.now()
      }, { merge: true });
    } catch(e) {}
    return price;
  } catch(error) {
    console.warn('[TON Price] Error:', error);
    return TON_PRICE || 2.50;
  }
}

function getSupportAmount() {
  return (1 / TON_PRICE).toFixed(6);
}

// ============================================
// ROTATING TICKER - WITH CACHE
// ============================================
async function fetchTickerData() {
  var track = document.getElementById('tickerTrack');
  
  // Check localStorage cache first
  var cached = CACHE.crypto.get();
  if (cached && cached.length > 0) {
    cryptoData = cached;
    renderTicker();
    // Continue to fetch fresh data in background
  }
  
  try {
    var cacheDoc = await db.collection('config').doc('cryptoCache').get();
    var today = getUTCDay();
    
    if (cacheDoc.exists) {
      var data = cacheDoc.data();
      if (data.day === today && data.prices && data.prices.length > 0) {
        var age = Date.now() - (data.timestamp || 0);
        if (age < 86400000) {
          cryptoData = data.prices;
          CACHE.crypto.set(cryptoData);
          renderTicker();
          return;
        }
      }
    }
    
    // Only show loading if no cached data exists
    if (!cached || cached.length === 0) {
      track.innerHTML = '<div class="ticker-loading"><div class="spinner"></div> Loading crypto prices...</div>';
    }
    
    var response = await fetch(
      'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=30&page=1&sparkline=false'
    );
    
    if (!response.ok) throw new Error('Failed to fetch crypto data');
    
    var data = await response.json();
    cryptoData = data.map(function(coin) {
      return {
        id: coin.id,
        symbol: coin.symbol,
        name: coin.name,
        price: coin.current_price,
        change: coin.price_change_percentage_24h,
        market_cap: coin.market_cap,
        image: coin.image
      };
    });
    
    // Cache to localStorage and Firestore
    CACHE.crypto.set(cryptoData);
    
    try {
      await db.collection('config').doc('cryptoCache').set({
        prices: cryptoData,
        day: today,
        timestamp: Date.now()
      }, { merge: true });
    } catch(e) {}
    
    renderTicker();
    
  } catch(error) {
    console.error('Crypto fetch error:', error);
    if (!cached || cached.length === 0) {
      track.innerHTML = '<div style="padding:0.5rem 1.5rem;color:#8a93a8;font-size:0.8rem;text-align:center;width:100%;">' +
        '❌ Failed to load crypto data. ' +
        '<button onclick="fetchTickerData()" class="btn-brand" style="margin-left:0.5rem;padding:0.2rem 0.8rem;font-size:0.7rem;">Retry</button>' +
        '</div>';
    }
  }
}

function renderTicker() {
  var track = document.getElementById('tickerTrack');
  var items = cryptoData.concat(cryptoData);
  
  track.innerHTML = items.map(function(coin) {
    var changeClass = coin.change >= 0 ? 'positive' : 'negative';
    var arrow = coin.change >= 0 ? '↑' : '↓';
    return '<div class="ticker-item">' +
      '<span class="symbol">' + coin.symbol + '</span>' +
      '<span class="price">$' + coin.price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 6 }) + '</span>' +
      '<span class="change ' + changeClass + '">' + arrow + ' ' + Math.abs(coin.change).toFixed(2) + '%</span>' +
      '<span class="divider">|</span>' +
      '</div>';
  }).join('');
}

// ============================================
// YOUTUBE EMBED DETECTION
// ============================================
function extractYouTubeId(url) {
  if (!url) return null;
  var patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/live\/([a-zA-Z0-9_-]{11})/
  ];
  for (var i = 0; i < patterns.length; i++) {
    var match = url.match(patterns[i]);
    if (match) return match[1];
  }
  return null;
}

function isYouTubeUrl(url) {
  return url && (url.indexOf('youtube.com') !== -1 || url.indexOf('youtu.be') !== -1);
}

// ============================================
// IMAGE UPLOAD TO IMGBB
// ============================================
async function uploadImageToImgBB(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = async function(e) {
      try {
        var base64 = e.target.result.split(',')[1];
        var formData = new FormData();
        formData.append('key', IMGBB_API_KEY);
        formData.append('image', base64);
        
        var response = await fetch('https://api.imgbb.com/1/upload', {
          method: 'POST',
          body: formData
        });
        
        var data = await response.json();
        if (data.success) {
          resolve(data.data.url);
        } else {
          reject(new Error(data.error?.message || 'Upload failed'));
        }
      } catch(error) {
        reject(error);
      }
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  var content = document.getElementById('postContent').value.trim();
  if (!content && selectedFiles.length === 0) {
    showToast('Please write something or add an image.', 'error');
    return;
  }
  
  if (!PROFILE) {
    showToast('Profile not loaded. Please try again.', 'error');
    return;
  }
  
  isSubmitting = true;
  var submitBtn = document.getElementById('postSubmitBtn');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '⏳ Posting...';
  
  var progressContainer = document.getElementById('uploadProgress');
  var progressFill = document.getElementById('progressFill');
  var progressText = document.getElementById('progressText');
  
  var imageUrls = [];
  
  if (selectedFiles.length > 0) {
    progressContainer.classList.add('show');
    var uploaded = 0;
    
    for (var i = 0; i < selectedFiles.length; i++) {
      var file = selectedFiles[i];
      progressText.textContent = 'Uploading ' + (uploaded + 1) + '/' + selectedFiles.length;
      progressFill.style.width = ((uploaded / selectedFiles.length) * 100) + '%';

        imageUrls.push(url);

        progressFill.style.width = ((uploaded / selectedFiles.length) * 100) + '%';
      } catch(error) {
        console.error('Upload error:', error);
        showToast('Failed to upload image: ' + error.message, 'error');
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Post';
        progressContainer.classList.remove('show');
        return;
      }
    }
    progressText.textContent = 'Uploaded ' + selectedFiles.length + '/' + selectedFiles.length + ' ✅';
    progressFill.style.width = '100%';
  }
  
  try {
    var postData = {
      userId: String(PROFILE.telegramId),
      author: {
        name: PROFILE.displayName || 'Yong User',
        handle: PROFILE.username ? '@' + PROFILE.username : 'tg_' + PROFILE.telegramId,

        angry: 0,

    };
    
    await db.collection('posts').add(postData);
    
    showToast('Post created successfully! 🎉', 'success');
    AdManager.onPost();
    closePostPopup();
    
  } catch(error) {
    console.error('Post error:', error);
    showToast('Failed to create post: ' + error.message, 'error');
  } finally {
    isSubmitting = false;
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Post';
    progressContainer.classList.remove('show');
  }
}

// RSS FEED SYSTEM - WITH CACHE
// ============================================
function rssPostId(url) {
  var hash = 0;
  for (var i = 0; i < url.length; i++) {
    hash = ((hash << 5) - hash) + url.charCodeAt(i);
    hash |= 0;
  }
  return 'rss_' + Math.abs(hash).toString(36);
}

function stripHtml(html) {
  return html.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ')
             .replace(/&amp;/g, '&').replace(/&lt;/g, '<')
             .replace(/&gt;/g, '>').replace(/&quot;/g, '"')
             .replace(/&#39;/g, "'").trim();
}

function extractRssImage(item) {
  var src = (item.enclosure?.link) ||
    (item.content || item.description || '').match(/<img[^>]+src=["']([^"']+)["']/i)?.[1] ||
    (item.thumbnail) || null;
  return src || null;
}

async function loadRssPosts() {
  // Check localStorage cache first
  var cached = CACHE.rss.get();
  if (cached && cached.length > 0) {
    return cached;
  }

  try {
    var res = await fetch(RSS_PROXY + encodeURIComponent(RSS_FEED_URL));
    var json = await res.json();
    if (json.status !== 'ok' || !Array.isArray(json.items)) return [];

    var posts = json.items.map(function(item) {
      var id = rssPostId(item.link || item.guid || item.title);
      var pubDate = item.pubDate ? new Date(item.pubDate).getTime() : Date.now();
      var imgUrl = extractRssImage(item);
      var snippet = stripHtml(item.description || item.content || '').slice(0, 280);
      var title = item.title || '';
      var content = title + (snippet ? '\n\n' + snippet : '');

      return {
        id: id,
        isRss: true,
        rssUrl: item.link || item.guid,
        userId: 'yong_team',
        author: {
          name: 'Yong Team',
          handle: '@YongTeam',
          pfp: 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhu_7mdnTHeYcrLaxRY0veIDVO6Pb0Pk4ngLKZupHTxufcBF3hwrlsgIxyXHfiDu_NywzKTnvLoGuh37Lv6k1Qkl0Q5HlHFn_sOa6ow8cL2TGXee1kSl6Uohtv_SggJ1UBhfNpUG4ClC1kPMkpC7Am3wX3cmDve4a95uvhmjNfF97aP2-hUVpX_Wk2dh56a/s1200/file_00000000814c720aa68fca8155db1cab_copy_1200x630.png',
          wallet: YONG_TREASURY,
        },
        content: content,
        imageUrls: imgUrl ? [imgUrl] : [],
        createdAt: pubDate,
        reactions: { like: 0, dislike: 0, celebrate: 0, angry: 0, diamond: 0 },
      };
    });

    CACHE.rss.set(posts);
    return posts;
  } catch(e) {
    console.warn('RSS fetch failed:', e);
    return CACHE.rss.get() || [];
  }
}

// ============================================
// LOAD POSTS FROM FIRESTORE - WITH CACHE
// ============================================
function loadPosts() {
  // Check localStorage cache first for immediate display
  var cachedPosts = CACHE.posts.get();
  if (cachedPosts && cachedPosts.length > 0) {
    allPosts = cachedPosts;
    // Load RSS and merge
    loadRssPosts().then(function(rssPosts) {
      allPosts = mergeFeedPosts(cachedPosts, rssPosts);
      renderPosts();
    }).catch(function() {
      renderPosts();
    });
  } else {
    // No cache - show loading state
    renderPosts();
  }
  
  // Set up real-time listener for fresh data
  if (unsubscribePosts) {
    unsubscribePosts();
  }
  
  unsubscribePosts = db.collection('posts')
    .orderBy('createdAt', 'desc')
    .onSnapshot(function(snapshot) {
      var newPosts = [];
      snapshot.docChanges().forEach(function(change) {
        if (change.type === 'added') {
          var data = change.doc.data();
          var post = {
            id: change.doc.id,
            userId: data.userId,
            author: data.author || { name: 'Unknown', handle: '@unknown', pfp: 'Y', wallet: null },
            content: data.content || '',
            imageUrls: data.imageUrls || [],
            createdAt: data.createdAt?.toMillis?.() || Date.now(),
            reactions: data.reactions || { like: 0, dislike: 0, celebrate: 0, angry: 0, diamond: 0 }
          };
          // Copy user reaction fields
          for (var key in data) {
            if (key.indexOf('userReaction_') === 0) {
              post[key] = data[key];
            }
          }
          newPosts.push(post);
        }
      });
      
      // Merge with existing posts
      if (newPosts.length > 0) {
        var existingIds = new Set(allPosts.map(function(p) { return p.id; }));
        var freshNewPosts = newPosts.filter(function(p) { return !existingIds.has(p.id); });
        
        if (freshNewPosts.length > 0) {
          // Only show banner for others' posts (not user's own)
          var othersPosts = freshNewPosts.filter(function(p) { return p.userId !== String(PROFILE?.telegramId); });
          if (othersPosts.length > 0 && allPosts.length > 0) {
            newPostsCount += othersPosts.length;
            document.getElementById('newPostsCount').textContent = newPostsCount;
            document.getElementById('newPostsBanner').classList.add('show');
          }
          allPosts = newPosts.concat(allPosts);
        }
      }
      
      // Cache posts
      CACHE.posts.set(allPosts);
      
      // Merge with RSS and render
      loadRssPosts().then(function(rssPosts) {
        allPosts = mergeFeedPosts(allPosts, rssPosts);
        renderPosts();
      }).catch(function() {
        renderPosts();
      });
    }, function(error) {
      console.error('Posts listener error:', error);
      // If listener fails, at least we have cached data
    });
}

function mergeFeedPosts(firestorePosts, rssPosts) {
  var seen = new Set();
  var combined = firestorePosts.concat(rssPosts);
  var result = [];
  for (var i = 0; i < combined.length; i++) {
    var p = combined[i];
    if (!seen.has(p.id)) {
      seen.add(p.id);
      result.push(p);
    }
  }
  result.sort(function(a, b) {
    return b.createdAt - a.createdAt;
  });
  return result;
}

function loadNewPosts() {
  newPostsCount = 0;
  document.getElementById('newPostsBanner').classList.remove('show');
  loadPosts();
  document.querySelector('.feed-col').scrollTop = 0;
}

// ============================================
// REACTION HANDLERS - Only for Firestore posts
// ============================================
function handleReaction(postId, reactionKey) {
  if (!PROFILE) {
    showToast('Please sign in to react.', 'error');
    return;
  }
  
  var post = allPosts.find(function(p) { return p.id === postId; });
  if (!post) return;
  
  // DO NOT allow reactions on RSS posts
  if (post.isRss) {
    showToast('Reactions are not available on RSS posts.', 'error');
    return;
  }
  
  var userReactionKey = 'userReaction_' + PROFILE.telegramId;
  var currentReaction = post[userReactionKey] || null;
  
  // If user already reacted with the SAME reaction, remove it (toggle off)
  if (currentReaction === reactionKey) {
    post.reactions[reactionKey] = Math.max(0, post.reactions[reactionKey] - 1);
    delete post[userReactionKey];
  } 
  // If user is trying to react with a DIFFERENT reaction, switch
  else if (currentReaction && currentReaction !== reactionKey) {
    // Remove previous reaction
    if (post.reactions[currentReaction] > 0) {
      post.reactions[currentReaction] = Math.max(0, post.reactions[currentReaction] - 1);
    }
    // Add new reaction
    post.reactions[reactionKey] = (post.reactions[reactionKey] || 0) + 1;
    post[userReactionKey] = reactionKey;
  }
  // If user hasn't reacted yet, add the reaction
  else {
    post.reactions[reactionKey] = (post.reactions[reactionKey] || 0) + 1;
    post[userReactionKey] = reactionKey;
  }
  
  AdManager.onReaction();
  renderPosts();
  
  // Update Firestore
  var updateData = {
    reactions: post.reactions
  };
  if (post[userReactionKey]) {
    updateData[userReactionKey] = post[userReactionKey];
  } else {
    updateData[userReactionKey] = firebase.firestore.FieldValue.delete();
  }
  
  db.collection('posts').doc(postId).update(updateData).catch(function(error) {
    console.error('Reaction update error:', error);
    loadPosts();
  });
}

// ============================================
// RENDER POSTS
// ============================================
function renderPosts() {
  var container = document.getElementById('postsContainer');
  if (!container) return;
  
  if (!allPosts || allPosts.length === 0) {
    // Show loading if no posts yet
    if (isInitialLoad) {
      container.innerHTML = '<div class="empty-state">' +
        '<div class="icon">⏳</div>' +
        '<h3>Loading posts...</h3>' +
        '<p>Please wait while we fetch the latest updates.</p>' +
        '</div>';
      return;
    }
    container.innerHTML = '<div class="empty-state">' +
      '<div class="icon">📝</div>' +
      '<h3>No posts yet</h3>' +
      '<p>Be the first to share something with the Yong Social community!</p>' +
      '<button class="btn-brand" style="margin-top:1rem;" onclick="openPostPopup()">Create Post</button>' +
      '</div>';
    return;
  }
  
  isInitialLoad = false;
  
  var html = '';
  for (var i = 0; i < allPosts.length; i++) {
    var post = allPosts[i];
    var reactions = post.reactions || { like: 0, dislike: 0, celebrate: 0, angry: 0, diamond: 0 };
    var userReactionKey = 'userReaction_' + (PROFILE?.telegramId || '');
    var userReaction = post[userReactionKey] || null;
    var images = post.imageUrls || [];
    var hasMultipleImages = images.length > 1;
    var thumbnail = images.length > 0 ? images[0] : null;
    var isRss = post.isRss || false;
    var rssUrl = post.rssUrl || '';
    
    // Check for YouTube URL
    var youtubeMatch = post.content ? extractYouTubeId(post.content) : null;
    var hasYoutube = youtubeMatch !== null;
    
    // Check for link preview (non-YouTube URL)
    var linkUrl = (!hasYoutube && !thumbnail && post.content) ? extractFirstUrl(post.content) : null;
    var hasLinkPreview = linkUrl !== null && !isYouTubeUrl(linkUrl);
    
    var displayContent = post.content || '';
    var showReadMore = false;
    
    if (isRss && displayContent.length > 280) {
      displayContent = displayContent.substring(0, 280);
      showReadMore = true;
    }
    
    var postClick = isRss ? ' onclick="openRssPost(\'' + rssUrl + '\')" style="cursor:pointer"' : '';
    
    html += '<article class="tweet" data-post="' + post.id + '"' + postClick + '>';
    html += '<div class="pfp">';
    if (post.author?.pfp && post.author.pfp.indexOf('http') === 0) {
      html += '<img src="' + post.author.pfp + '" alt="" />';
    } else {
      html += (post.author?.pfp || 'Y');
    }
    html += '</div>';
    html += '<div class="content">';
    
    // HEADER
    html += '<div class="head">';
    html += '<span class="name">' + (post.author?.name || 'Unknown') + '</span>';
    if (isRss) {
      html += '<span class="verified" title="Official Yong Team post">✦</span>';
    }
    html += '<span class="handle">' + (post.author?.handle || '@unknown') + '</span>';
    html += '<span class="time">· ' + timeAgo(post.createdAt) + '</span>';
    html += '<span class="right">';
    
    if (isRss) {
      html += '<button class="post-menu-btn" onclick="event.stopPropagation();openRssPost(\'' + rssUrl + '\')" title="Read article">';
      html += '<i class="fa-solid fa-arrow-up-right-from-square"></i>';
      html += '</button>';
    } else {
      html += '<div class="post-menu-wrap">';
      html += '<button class="post-menu-btn" onclick="togglePostMenu(event,\'' + post.id + '\')"><i class="fa-solid fa-ellipsis-vertical"></i></button>';
      if (post.userId === String(PROFILE?.telegramId)) {
        html += '<div class="post-menu-dropdown" id="menu-' + post.id + '">';
        html += '<button onclick="deletePost(\'' + post.id + '\')"><i class="fa-solid fa-trash"></i> Delete</button>';
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</span>';
    html += '</div>';
    
    // CONTENT TEXT
    if (displayContent) {
      html += '<div class="text">' + linkifyText(displayContent) + (showReadMore ? '...' : '') + '</div>';
    }
    
    if (showReadMore) {
      html += '<span class="read-more" onclick="event.stopPropagation();openRssPost(\'' + rssUrl + '\')">Read more →</span>';
    }
    
    // YOUTUBE EMBED
    if (hasYoutube) {
      html += '<div class="youtube-embed">';
      html += '<iframe src="https://www.youtube-nocookie.com/embed/' + youtubeMatch + '?autoplay=0&rel=0" allowfullscreen loading="lazy"></iframe>';
      html += '</div>';
    }
    
    // IMAGES
    if (!hasYoutube && thumbnail) {
      if (!hasMultipleImages) {
        html += '<div class="post-images single-img"><img src="' + thumbnail + '" alt="Post image" loading="lazy" /></div>';
      } else {
        html += '<div class="post-images" id="vp-' + post.id + '" data-total="' + images.length + '">';
        for (var j = 0; j < images.length; j++) {
          html += '<div class="slide' + (j === 0 ? ' active' : '') + '">';
          html += '<img src="' + images[j] + '" alt="Slide ' + (j+1) + '" loading="lazy" />';
          html += '</div>';
        }
        html += '<div class="watermark">YongSocial</div>';
        html += '<div class="center-play" id="cp-' + post.id + '">';
        html += '<button class="play-btn" onclick="startPlayer(\'' + post.id + '\')"><i class="fa-solid fa-play"></i></button>';
        html += '</div>';
        html += '<div class="video-controls">';
        html += '<div class="progress-bar" onclick="seekPlayer(event,\'' + post.id + '\')">';
        html += '<div class="progress-fill" id="pf-' + post.id + '"></div>';
        html += '</div>';
        html += '<div class="ctrl-row">';
        html += '<button class="ctrl-btn" id="ppbtn-' + post.id + '" onclick="togglePlayer(\'' + post.id + '\')"><i class="fa-solid fa-pause"></i></button>';
        html += '<span class="time-display" id="td-' + post.id + '">0:00 / ' + Math.floor(images.length * 5 / 60) + ':' + String(images.length * 5 % 60).padStart(2, '0') + '</span>';
        html += '<div class="slide-dots" id="sd-' + post.id + '">';
        for (var k = 0; k < images.length; k++) {
          html += '<span class="slide-dot' + (k === 0 ? ' active' : '') + '"></span>';
        }
        html += '</div>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
      }
    }
    
    // LINK PREVIEW (for non-YouTube URLs) - placed BEFORE reactions
    if (hasLinkPreview) {
      html += '<div id="lp-' + post.id + '" class="link-preview-placeholder"></div>';
    }
    
    // REACTIONS AND SUPPORT - ONLY for Firestore posts (not RSS)
    html += '<div class="actions-row">';
    
    // Only show reactions for non-RSS posts
    if (!isRss) {
      html += '<div class="reactions" onclick="event.stopPropagation()">';
      var reactionKeys = ['like', 'dislike', 'celebrate', 'angry', 'diamond'];
      var emojis = { like: '👍', dislike: '👎', celebrate: '🎉', angry: '😡', diamond: '💎' };
      for (var r = 0; r < reactionKeys.length; r++) {
        var key = reactionKeys[r];
        var active = userReaction === key ? ' active' : '';
        var count = reactions[key] > 0 ? reactions[key] : '';
        html += '<button class="reaction-btn' + active + '" onclick="handleReaction(\'' + post.id + '\',\'' + key + '\')">';
        html += '<span class="emoji">' + emojis[key] + '</span>';
        html += '<span class="count">' + count + '</span>';
        html += '</button>';
      }
      html += '</div>';
    } else {
      // RSS posts get a placeholder to keep alignment
      html += '<div style="flex:1;"></div>';
    }
    
    // Creator support - show for all posts with wallet
    if (post.author?.wallet) {
      html += '<div class="creator-support" onclick="openCreatorSupport(\'' + post.author.wallet + '\')">';
      html += '<span class="diamond">💎</span>';
      html += '<span class="value">' + getSupportAmount() + '</span>';
      html += '</div>';
    }
    
    html += '</div>';
    html += '</div>';
    html += '</article>';
  }
  
  container.innerHTML = html;
  
  // Fetch link previews after rendering
  for (var i = 0; i < allPosts.length; i++) {
    var post = allPosts[i];
    if (!post.imageUrls?.length && post.content) {
      var url = extractFirstUrl(post.content);
      if (url && !isYouTubeUrl(url)) {
        fetchLinkPreview(url, post.id);
      }
    }
  }
}

// ============================================
// TIME AGO HELPER
// ============================================
function timeAgo(timestamp) {
  if (!timestamp) return 'Just now';
  var now = Date.now();
  var diff = now - timestamp;
  
  var seconds = Math.floor(diff / 1000);
  var minutes = Math.floor(seconds / 60);
  var hours = Math.floor(minutes / 60);
  var days = Math.floor(hours / 24);
  
  if (seconds < 60) return 'Just now';
  if (minutes < 60) return minutes + 'm';
  if (hours < 24) return hours + 'h';
  if (days < 7) return days + 'd';
  return new Date(timestamp).toLocaleDateString();
}

// ============================================
// LINK PREVIEW
// ============================================
function extractFirstUrl(text) {
  var m = text.match(/https?:\/\/[^\s]+/);
  return m ? m[0] : null;
}

function linkifyText(text) {
  return text
    .replace(/\n/g, '<br>')
    .replace(/(https?:\/\/[^\s<]+)/g, function(match) {
      if (isYouTubeUrl(match)) return match;
      return '<a href="' + match + '" target="_blank" rel="noopener" style="color:#d4b25a;text-decoration:underline;word-break:break-all;">' + match + '</a>';
    });
}

async function fetchLinkPreview(url, postId) {
  var el = document.getElementById('lp-' + postId);
  if (!el) return;

  if (_ogCache[url]) { renderLinkPreview(el, _ogCache[url], url); return; }

  try {
    var res = await fetch(OG_PROXY + '?url=' + encodeURIComponent(url));
    var data = await res.json();
    if (data.error) return;
    _ogCache[url] = data;
    renderLinkPreview(el, data, url);
  } catch(e) { /* silently fail */ }
}

function renderLinkPreview(el, data, url) {
  el.outerHTML = '<a class="link-preview' + (data.image ? '' : ' no-img') + '" href="' + url + '" target="_blank" rel="noopener">' +
    (data.image ? '<img class="lp-img" src="' + data.image + '" alt="" loading="lazy" onerror="this.parentElement.classList.add(\'no-img\');this.remove();" />' : '') +
    '<div class="lp-body">' +
    '<div class="lp-site">' + (data.siteName || new URL(url).hostname) + '</div>' +
    (data.title ? '<div class="lp-title">' + data.title + '</div>' : '') +
    (data.description ? '<div class="lp-desc">' + data.description + '</div>' : '') +
    '</div>' +
    '</a>';
}

async function loadProfileByGoogleUid(googleUid) {
  // Check cache first
  var cached = CACHE.profile.get();
  if (cached) {
    PROFILE = cached;
    userWalletAddress = PROFILE.walletAddress || null;
    updateSidebar();
    updateProfileView();
    // Continue to fetch fresh data in background
  }
  
  try {
    var linkSnap = await db.collection('userLinks').doc(googleUid).get();
    if (linkSnap.exists) {
      var telegramId = linkSnap.data().telegramId;
      var profileSnap = await db.collection('profiles').doc(telegramId).get();
      if (profileSnap.exists) {
        PROFILE = profileSnap.data();
        userWalletAddress = PROFILE.walletAddress || null;
        CACHE.profile.set(PROFILE);
        updateSidebar();
        updateProfileView();
        return true;
      }
    }
    
    var querySnap = await db.collection('profiles').where('googleUid', '==', googleUid).get();
    if (!querySnap.empty) {
      var doc = querySnap.docs[0];
      PROFILE = doc.data();
      userWalletAddress = PROFILE.walletAddress || null;
      CACHE.profile.set(PROFILE);
      updateSidebar();
      updateProfileView();
      return true;
    }
    
    return false;
  } catch(error) {
    console.error('Load profile error:', error);
    // If we have cached profile, return true even if fresh fetch fails
    return !!cached;
  }
}

          document.querySelectorAll('.creator-support .value').forEach(function(el) {
            el.textContent = value;
          });
        }, 300000);
        
        if (!userWalletAddress) {
          setTimeout(showWalletPopup, 600);
        }
        
        console.log('[Feed] Profile loaded:', PROFILE);
      } else {
        showToast('No profile found linked to this Google account.', 'error');
        setTimeout(function() {
          window.location.href = 'https://yongsocial.github.io/sphere/';
        }, 3000);
      }
    } catch(error) {
      console.error('Feed error:', error);
      showToast('Error loading profile: ' + error.message, 'error');
    }
  } else {
    showToast('Please sign in to access the community.', 'error');
    setTimeout(function() {
      window.location.href = 'https://yongsocial.github.io/sphere/';
    }, 2000);
  }
});

// ============================================
// INLINE IMAGE VIDEO PLAYER
// ============================================
function startPlayer(postId) {
  var vp = document.getElementById('vp-' + postId);
  if (!vp) return;
  var cp = document.getElementById('cp-' + postId);
  cp.classList.add('hidden');
  vp.classList.add('playing');
  if (!_players[postId]) {
    _players[postId] = { timer: null, elapsed: 0, playing: true, idx: 0, total: parseInt(vp.dataset.total) };
  } else {
    _players[postId].playing = true;
  }
  _tickPlayer(postId);
}

function togglePlayer(postId) {
  var p = _players[postId];
  if (!p) return;
  var btn = document.getElementById('ppbtn-' + postId);
  if (p.playing) {
    p.playing = false;
    clearTimeout(p.timer);
    btn.innerHTML = '<i class="fa-solid fa-play"></i>';
  } else {
    p.playing = true;
    btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    _tickPlayer(postId);
  }
}

function _tickPlayer(postId) {
  var p = _players[postId];
  if (!p || !p.playing) return;
  clearTimeout(p.timer);
  var SLIDE_DUR = 5000;
  var TICK = 100;
  var totalMs = p.total * SLIDE_DUR;

  var pf = document.getElementById('pf-' + postId);
  var td = document.getElementById('td-' + postId);
  var sd = document.getElementById('sd-' + postId);
  var vp = document.getElementById('vp-' + postId);

  function tick() {
    if (!_players[postId]?.playing) return;
    p.elapsed += TICK;
    if (p.elapsed >= totalMs) {
      p.elapsed = 0;
    }
    var pct = (p.elapsed / totalMs) * 100;
    if (pf) pf.style.width = pct + '%';

    var elSec = Math.floor(p.elapsed / 1000);
    var totSec = Math.floor(totalMs / 1000);
    function fmt(s) {
      return Math.floor(s/60) + ':' + String(s%60).padStart(2, '0');
    }
    if (td) td.textContent = fmt(elSec) + ' / ' + fmt(totSec);

    var newIdx = Math.floor(p.elapsed / SLIDE_DUR) % p.total;
    if (newIdx !== p.idx) {
      var slides = vp.querySelectorAll('.slide');
      if (slides[p.idx]) slides[p.idx].classList.remove('active');
      if (slides[newIdx]) slides[newIdx].classList.add('active');
      var dots = sd?.querySelectorAll('.slide-dot');
      if (dots && dots[p.idx]) dots[p.idx].classList.remove('active');
      if (dots && dots[newIdx]) dots[newIdx].classList.add('active');
      p.idx = newIdx;
    }

    p.timer = setTimeout(tick, TICK);
  }
  tick();
}

function seekPlayer(event, postId) {
  var p = _players[postId];
  if (!p) return;
  var bar = event.currentTarget;
  var rect = bar.getBoundingClientRect();
  var ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
  var totalMs = p.total * 5000;
  p.elapsed = Math.floor(ratio * totalMs / 100) * 100;
}
